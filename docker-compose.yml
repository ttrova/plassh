services:
  app:
    build: .
    ports:
      - "2222:2222"
    environment:
      REDIS_ADDR: redis:6379
      CANVAS_WIDTH: "100"
      CANVAS_HEIGHT: "100"
      SSH_PORT: "2222"
      SSH_HOST_KEY: /data/host_key
    volumes:
      - hostkey:/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  hostkey:
  redisdata:
