services:
  app:
    build: .
    ports:
      - "2222:2222"
    environment:
      REDIS_ADDR: redis:6379
      CANVAS_WIDTH: "160"
      CANVAS_HEIGHT: "90"
      SSH_PORT: "2222"
      SSH_HOST_KEY: /data/host_key
      # Comma-separated slash commands to hard-disable, e.g. "clear,fill". Empty = all enabled.
      DISABLED_COMMANDS: ""
      # Admin: set a password to enable /login. ADMIN_COMMANDS lists admin-only
      # commands ("*" = all). PAINT_COOLDOWN_MS throttles paints (0 = off, admins exempt).
      ADMIN_PASSWORD: ""
      ADMIN_COMMANDS: ""
      PAINT_COOLDOWN_MS: "0"
    volumes:
      - hostkey:/data
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  hostkey:
  redisdata:
